# Nginx reverse proxy config for OpenMAIC
# Place this at: /etc/nginx/sites-available/openmaic
# Then: sudo ln -s /etc/nginx/sites-available/openmaic /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# For SSL, run: sudo certbot --nginx -d yourdomain.com

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Max upload size (for PDF/image uploads)
    client_max_body_size 200m;

    # Proxy to Next.js app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Required for SSE (streaming AI responses)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (long for AI generation)
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }
}
